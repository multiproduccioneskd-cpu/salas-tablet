<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Agenda diaria de Salas - UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .main-header {
            background: rgba(27, 42, 74, 0.95);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 5px solid #dda126;
        }

        .header-left-block { display: flex; align-items: center; gap: 20px; }
        .header-logo { width: 65px; height: auto; object-fit: contain; }
        .header-text-group .title { font-size: 22px; font-weight: bold; letter-spacing: 0.5px; }
        .header-text-group .subtitle { font-size: 12px; color: #b0c4de; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: right;
            line-height: 1.3;
        }

        .live-time { color: #52b3e5; display: block; font-size: 16px; margin-top: 2px; }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48%, 1fr));
            gap: 20px;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) { .rooms-grid { grid-template-columns: 1fr; } }

        .room-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border-top: 5px solid #1b2a4a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .room-card:hover { transform: translateY(-2px); }
        .room-card.directorio-style { border-top: 5px solid #dda126; }

        .room-title-bar {
            background: rgba(248, 249, 250, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name { font-size: 16px; font-weight: bold; color: #1b2a4a; }
        .room-card.directorio-style .room-name { color: #b8820a; }
        .event-count { font-size: 11px; background: #1b2a4a; color: #fff; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .room-card.directorio-style .event-count { background: #dda126; }

        .meetings-list { padding: 15px 20px; flex-grow: 1; overflow-y: auto; max-height: 280px; }

        .meeting-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            opacity: 1;
            transform: scaleY(1);
            transform-origin: top;
            transition: opacity 0.8s ease, transform 0.8s ease, padding 0.8s ease, max-height 0.8s ease;
            max-height: 100px; 
        }

        .meeting-item:last-child { border-bottom: none; }
        .meeting-time { min-width: 95px; }
        .time-box { background: #e2e8f0; color: #1b2a4a; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; display: inline-block; text-align: center; }
        .meeting-details { flex-grow: 1; padding-left: 15px; }
        .meeting-title { font-size: 14px; font-weight: bold; color: #2d3748; }

        .meeting-item.fade-out {
            opacity: 0;
            transform: scaleY(0);
            padding-top: 0;
            padding-bottom: 0;
            max-height: 0;
            border-bottom: none;
        }

        .no-meetings { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 120px; color: #718096; font-style: italic; font-size: 13px; text-align: center; }

        .brand-bar { height: 5px; width: 100%; display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .brand-bar .color-1 { flex: 2; background-color: #1b2a4a; }
        .brand-bar .color-2 { flex: 1; background-color: #52b3e5; }
        .brand-bar .color-3 { flex: 1; background-color: #dda126; }
        .footer-text { text-align: center; margin-top: 10px; font-size: 11px; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-left-block">
            <img src="logo-blanco-celeste.png" alt="Logo UGM" class="header-logo">
            <div class="header-text-group">
                <div class="title">Visor de Agenda diaria de Salas</div>
                <div class="subtitle">Universidad Gabriela Mistral — Vista General</div>
            </div>
        </div>
        <div class="date-badge">
            <span id="liveDate">Cargando fecha...</span>
            <span id="liveTime" class="live-time">00:00:00</span>
        </div>
    </div>

    <div class="rooms-grid" id="roomsContainer"></div>

    <div>
        <div class="brand-bar">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
        </div>
        <div class="footer-text">Universidad Gabriela Mistral — Construyendo Nuestra Huella</div>
    </div>

    <script>
        let salasMapeadas = {};

        function formatISODateToHHMM(isoString) {
            if (!isoString) return "00:00";
            try {
                const dateObj = new Date(isoString);
                const hours = String(dateObj.getHours()).padStart(2, '0');
                const minutes = String(dateObj.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
            } catch (e) {
                return "00:00";
            }
        }

        function isEventToday(isoString) {
            if (!isoString) return false;
            try {
                const eventDate = new Date(isoString);
                const today = new Date();
                return eventDate.getDate() === today.getDate() &&
                       eventDate.getMonth() === today.getMonth() &&
                       eventDate.getFullYear() === today.getFullYear();
            } catch (e) {
                return false;
            }
        }

        function parseField(value) {
            if (!value) return "";
            if (typeof value === 'object') {
                return value.Value || value.Label || value.DisplayName || value.TermLabel || JSON.stringify(value);
            }
            return String(value);
        }

        async function fetchSalasFromAPI() {
            try {
                const response = await fetch('/api/salas');
                const data = await response.json();
                
                if (data && data.value) {
                    processSharepointData(data.value);
                }
            } catch (error) {
                console.error("Error al conectar con la API interna:", error);
            }
        }

        function processSharepointData(items) {
            // Estructura limpia de los paneles del Visor General
            salasMapeadas = {
                "Sala Junta Directiva": { displayName: "Sala Junta Directiva", isDirectorio: true, agenda: [] },
                "Sala 1": { displayName: "Sala 1", isDirectorio: false, agenda: [] },
                "Sala 2": { displayName: "Sala 2", isDirectorio: false, agenda: [] },
                "Sala 3": { displayName: "Sala 3", isDirectorio: false, agenda: [] }
            };

            items.forEach((item, index) => {
                const fields = item.fields;
                if (!fields) return;

                // CORRECCIÓN CLAVE DE ASIGNACIÓN BASADA EN TU CAPTURA DE SHAREPOINT:
                // 1. La columna 'Sala' define el lugar físico destino
                const columnaSalaRaw = String(fields.Sala || "").toLowerCase(); 
                const rawInicio = fields.HoraInicio;
                const rawFin = fields.HoraFin;

                // 2. Definición del nombre de la reunión: prioridad columna 'Asunto', respaldo columna 'Title'
                let nombreDeLaReunion = parseField(fields.Asunto || fields.asunto).trim();
                if (!nombreDeLaReunion) {
                    nombreDeLaReunion = parseField(fields.Title || fields.LinkTitle).trim();
                }

                if (isEventToday(rawInicio) && columnaSalaRaw) {
                    let salaKey = "";
                    
                    // Enrutamos estrictamente usando el texto de la columna "Sala" de SharePoint
                    if (columnaSalaRaw.includes("junta") || columnaSalaRaw.includes("directiva") || columnaSalaRaw.includes("directorio")) {
                        salaKey = "Sala Junta Directiva";
                    } else if (columnaSalaRaw.includes("sala 1") || columnaSalaRaw.endsWith("1")) {
                        salaKey = "Sala 1";
                    } else if (columnaSalaRaw.includes("sala 2") || columnaSalaRaw.endsWith("2")) {
                        salaKey = "Sala 2";
                    } else if (columnaSalaRaw.includes("sala 3") || columnaSalaRaw.endsWith("3")) {
                        salaKey = "Sala 3";
                    }

                    if (salaKey && salasMapeadas[salaKey]) {
                        const horaInicioLimpia = formatISODateToHHMM(rawInicio);
                        const horaFinLimpia = formatISODateToHHMM(rawFin);

                        salasMapeadas[salaKey].agenda.push({
                            idMeet: `sp-${index}`,
                            title: nombreDeLaReunion, // Aquí va el Asunto o el Título real de la actividad
                            startTime: horaInicioLimpia,
                            endTime: horaFinLimpia
                        });
                    }
                }
            });

            // Ordenar las reuniones cronológicamente de mañana a tarde
            Object.keys(salasMapeadas).forEach(key => {
                salasMapeadas[key].agenda.sort((a, b) => a.startTime.localeCompare(b.startTime));
            });

            renderDashboard();
        }

        function renderDashboard() {
            const container = document.getElementById('roomsContainer');
            if (!container) return;
            
            let gridHTML = "";
            const salasAListar = Object.keys(salasMapeadas).length > 0 ? salasMapeadas : {
                "Sala Junta Directiva": { displayName: "Sala Junta Directiva", isDirectorio: true, agenda: [] },
                "Sala 1": { displayName: "Sala 1", isDirectorio: false, agenda: [] },
                "Sala 2": { displayName: "Sala 2", isDirectorio: false, agenda: [] },
                "Sala 3": { displayName: "Sala 3", isDirectorio: false, agenda: [] }
            };

            Object.keys(salasAListar).forEach(key => {
                const sala = salasAListar[key];
                const cardClass = sala.isDirectorio ? "room-card directorio-style" : "room-card";
                const totalReuniones = sala.agenda.length;
                const countText = totalReuniones === 0 ? "Disponible" : (totalReuniones === 1 ? "1 Reunión" : `${totalReuniones} Reuniones`);

                gridHTML += `
                    <div class="${cardClass}">
                        <div class="room-title-bar">
                            <span class="room-name">${sala.displayName}</span>
                            <span class="event-count" id="count-${key}">${countText}</span>
                        </div>
                        <div class="meetings-list" id="list-${key}">
                `;

                if (totalReuniones === 0) {
                    gridHTML += `<div class="no-meetings" id="empty-${key}">No hay reuniones programadas para hoy en esta sala.</div>`;
                } else {
                    sala.agenda.forEach(meet => {
                        gridHTML += `
                            <div class="meeting-item" id="meet-${meet.idMeet}">
                                <div class="meeting-time">
                                    <span class="time-box">${meet.startTime} - ${meet.endTime}</span>
                                </div>
                                <div class="meeting-details">
                                    <div class="meeting-title">${meet.title}</div>
                                </div>
                            </div>
                        `;
                    });
                }

                gridHTML += `</div></div>`;
            });

            container.innerHTML = gridHTML;
        }

        function checkMeetingsExpiration() {
            if (Object.keys(salasMapeadas).length === 0) return;
            
            Object.keys(salasMapeadas).forEach(key => {
                const sala = salasMapeadas[key];
                const now = new Date();
                const currentMinutesTotal = (now.getHours() * 60) + now.getMinutes();

                for (let i = sala.agenda.length - 1; i >= 0; i--) {
                    const meet = sala.agenda[i];
                    const [startHour, startMin] = meet.startTime.split(':').map(Number);
                    
                    if (!isNaN(startHour) && !isNaN(startMin)) {
                        const startMinutesTotal = (startHour * 60) + startMin;

                        if (currentMinutesTotal >= (startMinutesTotal + 20)) {
                            const element = document.getElementById(`meet-${meet.idMeet}`);
                            if (element && !element.classList.contains('fade-out')) {
                                element.classList.add('fade-out');

                                setTimeout(() => {
                                    sala.agenda = sala.agenda.filter(m => m.idMeet !== meet.idMeet);
                                    element.remove();
                                    
                                    const total = sala.agenda.length;
                                    document.getElementById('count-' + key).innerText = total === 0 ? "Disponible" : (total === 1 ? "1 Reunión" : `${total} Reuniones`);
                                    
                                    if (total === 0) {
                                        const listContainer = document.getElementById(`list-${key}`);
                                        if (listContainer) {
                                            listContainer.innerHTML = `<div class="no-meetings" id="empty-${key}">No hay reuniones programadas para hoy en esta sala.</div>`;
                                        }
                                    }
                                }, 800);
                            }
                        }
                    }
                }
            });
        }

        function updateLiveDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let dateStr = now.toLocaleDateString('es-CL', dateOptions);
            document.getElementById('liveDate').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('es-CL', timeOptions);

            checkMeetingsExpiration();
        }
        
        window.onload = function() {
            updateLiveDateTime();
            renderDashboard(); 
            fetchSalasFromAPI();
            setInterval(updateLiveDateTime, 1000);
            setInterval(fetchSalasFromAPI, 20000);
        };
    </script>
</body>
</html>
