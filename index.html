<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Agenda diaria de Salas - UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Encabezado Superior Translúcido */
        .main-header {
            background: rgba(27, 42, 74, 0.95);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 5px solid #dda126; /* Mantiene la marca dorada lateral del header */
        }

        .header-left-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            width: 65px;
            height: auto;
            object-fit: contain;
        }

        .header-text-group .title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .header-text-group .subtitle {
            font-size: 12px;
            color: #b0c4de;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Badge que contiene Fecha y Hora en tiempo real */
        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: right;
            line-height: 1.3;
        }

        .live-time {
            color: #52b3e5; /* Resalte celeste institucional */
            display: block;
            font-size: 16px;
            margin-top: 2px;
        }

        /* Contenedor Grid para ver todas las salas a la vez */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48%, 1fr));
            gap: 20px;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .rooms-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Tarjeta de cada Sala (Estilo Azul Único) */
        .room-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border-top: 5px solid #1b2a4a; /* Borde superior azul para TODAS las salas */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .room-card:hover {
            transform: translateY(-2px);
        }

        /* **ACTUALIZACIÓN:** Se han eliminado las reglas .directorio-style para unificar el color */

        .room-title-bar {
            background: rgba(248, 249, 250, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name {
            font-size: 16px;
            font-weight: bold;
            color: #1b2a4a; /* Nombre de sala azul para todas */
        }

        .event-count {
            font-size: 11px;
            background: #1b2a4a; /* Fondo azul para el contador */
            color: #fff;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Lista de reuniones dentro de la tarjeta */
        .meetings-list {
            padding: 15px 20px;
            flex-grow: 1;
            overflow-y: auto;
            max-height: 280px;
        }

        /* Item de reunión individual */
        .meeting-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            opacity: 1;
            transform: scaleY(1);
            transform-origin: top;
            transition: opacity 0.8s ease, transform 0.8s ease, padding 0.8s ease, max-height 0.8s ease;
            max-height: 100px; 
        }

        .meeting-item:last-child {
            border-bottom: none;
        }

        .meeting-time {
            min-width: 95px;
        }

        .time-box {
            background: #e2e8f0;
            color: #1b2a4a;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            text-align: center;
        }

        .meeting-details {
            flex-grow: 1;
            padding-left: 15px;
        }

        .meeting-title {
            font-size: 14px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 2px;
        }

        .meeting-info {
            font-size: 12px;
            color: #718096;
        }

        /* Clase de CSS para el desvanecimiento */
        .meeting-item.fade-out {
            opacity: 0;
            transform: scaleY(0);
            padding-top: 0;
            padding-bottom: 0;
            max-height: 0;
            border-bottom: none;
        }

        /* Estado sin reuniones */
        .no-meetings {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 120px;
            color: #718096;
            font-style: italic;
            font-size: 13px;
            text-align: center;
        }

        /* Barra Inferior Corporativa */
        .brand-bar {
            height: 5px;
            width: 100%;
            display: flex;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .brand-bar .color-1 { flex: 2; background-color: #1b2a4a; }
        .brand-bar .color-2 { flex: 1; background-color: #52b3e5; }
        .brand-bar .color-3 { flex: 1; background-color: #dda126; }

        .footer-text {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-left-block">
            <img src="logo-blanco-celeste.png" alt="Logo UGM" class="header-logo">
            <div class="header-text-group">
                <div class="title">Visor de Agenda diaria de Salas</div>
                <div class="subtitle">Universidad Gabriela Mistral — Vista General</div>
            </div>
        </div>
        <div class="date-badge">
            <span id="liveDate">Cargando fecha...</span>
            <span id="liveTime" class="live-time">00:00:00</span>
        </div>
    </div>

    <div class="rooms-grid" id="roomsContainer"></div>

    <div>
        <div class="brand-bar">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
        </div>
        <div class="footer-text">
            Universidad Gabriela Mistral — Construyendo Nuestra Huella
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE CONEXIÓN A LAS SALAS (MAPEO DINÁMICO)
        // **ACTUALIZACIÓN:** Se ha cambiado isDirectorio a false para la Sala Junta Directiva
        const salasUGM = [
            {
                id: "3162F1E1-C4C0-604B-51D8-91DA78970B97",
                resourceEmail: "sala.directorio@ugm.cl",
                displayName: "Sala Junta Directiva",
                isDirectorio: false, // Ahora usa el estilo azul por defecto
                agenda: [
                    { idMeet: "m1", title: "Sesión Ordinaria de Directorio UGM", org: "Secretaría General", time: "09:00 - 11:00" },
                    { idMeet: "m2", title: "Comité de Aseguramiento de la Calidad", org: "Dirección de Calidad", time: "11:30 - 13:00" },
                    { idMeet: "m3", title: "Revisión Estratégica Institucional", org: "Rectoría", time: "15:00 - 16:30" }
                ]
            },
            {
                id: "A1B2C3D4-E5F6-7A8B-9C0D-1E2F3A4B5C6D",
                resourceEmail: "sala.reuniones2@ugm.cl",
                displayName: "Sala 1",
                isDirectorio: false,
                agenda: [
                    { idMeet: "m4", title: "Coordinación Matrículas y Admisión", org: "Equipo de Difusión", time: "10:00 - 11:30" },
                    { idMeet: "m5", title: "Planificación Encuentro Alumni UGM", org: "Dirección de Vinculación", time: "14:30 - 16:00" }
                ]
            },
            {
                id: "F6E5D4C3-B2A1-0F9E-8D7C-6B5A4M3N2P1Q",
                resourceEmail: "sala.reuniones3@ugm.cl",
                displayName: "Sala 2",
                isDirectorio: false,
                agenda: []
            },
            {
                id: "78912345-6789-abcd-ef01-234567890abc",
                resourceEmail: "sala.reuniones4@ugm.cl",
                displayName: "Sala 3",
                isDirectorio: false,
                agenda: [
                    { idMeet: "m6", title: "Alineación Plataformas TI y Virtuales", org: "Soporte Técnico", time: "16:00 - 17:30" }
                ]
            }
        ];

        function renderDashboard() {
            const container = document.getElementById('roomsContainer');
            let gridHTML = "";

            salasUGM.forEach(sala => {
                const cardClass = "room-card"; // Simplificado, ya no se aplica directorio-style
                const totalReuniones = sala.agenda.length;
                const countText = totalReuniones === 0 ? "Disponible" : (totalReuniones === 1 ? "1 Reunión" : `${totalReuniones} Reuniones`);

                gridHTML += `
                    <div class="${cardClass}">
                        <div class="room-title-bar">
                            <span class="room-name">${sala.displayName}</span>
                            <span class="event-count" id="count-${sala.id}">${countText}</span>
                        </div>
                        <div class="meetings-list" id="list-${sala.id}">
                `;

                if (totalReuniones === 0) {
                    gridHTML += `
                        <div class="no-meetings" id="empty-${sala.id}">
                            No hay reuniones programadas para hoy en esta sala.
                        </div>
                    `;
                } else {
                    sala.agenda.forEach(meet => {
                        gridHTML += `
                            <div class="meeting-item" id="meet-${meet.idMeet}">
                                <div class="meeting-time">
                                    <span class="time-box">${meet.time}</span>
                                </div>
                                <div class="meeting-details">
                                    <div class="meeting-title">${meet.title}</div>
                                    <div class="meeting-info">Organiza: ${meet.org}</div>
                                </div>
                            </div>
                        `;
                    });
                }

                gridHTML += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = gridHTML;
        }

        // Lógica de desvanecimiento tras 20 minutos
        function checkMeetingsExpiration() {
            const now = new Date();
            const currentMinutesTotal = (now.getHours() * 60) + now.getMinutes();

            salasUGM.forEach(sala => {
                // Recorremos la agenda al revés para poder eliminar elementos de forma segura
                for (let i = sala.agenda.length - 1; i >= 0; i--) {
                    const meet = sala.agenda[i];
                    // El formato del tiempo es "HH:MM - HH:MM", extraemos el inicio
                    const startTimeStr = meet.time.split(' - ')[0];
                    const [startHour, startMin] = startTimeStr.split(':').map(Number);
                    const startMinutesTotal = (startHour * 60) + startMin;

                    // Si pasaron 20 minutos desde el inicio de la reunión
                    if (currentMinutesTotal >= (startMinutesTotal + 20)) {
                        const element = document.getElementById(`meet-${meet.idMeet}`);
                        
                        if (element && !element.classList.contains('fade-out')) {
                            // 1. Inyectamos la clase fade-out de CSS
                            element.classList.add('fade-out');

                            // 2. Sacamos el objeto del arreglo interno tras terminar la animación visual (800ms)
                            setTimeout(() => {
                                sala.agenda = sala.agenda.filter(m => m.idMeet !== meet.idMeet);
                                element.remove();
                                
                                // Recalcular contadores en la tarjeta de la sala
                                const total = sala.agenda.length;
                                const countElement = document.getElementById(`count-${sala.id}`);
                                if (countElement) {
                                    countElement.innerText = total === 0 ? "Disponible" : (total === 1 ? "1 Reunión" : `${total} Reuniones`);
                                }
                                
                                // Si se quedó vacía, mostramos el mensaje de "Disponible"
                                if (total === 0) {
                                    const listContainer = document.getElementById(`list-${sala.id}`);
                                    if (listContainer && !document.getElementById(`empty-${sala.id}`)) {
                                        listContainer.innerHTML = `<div class="no-meetings" id="empty-${sala.id}">No hay reuniones programadas para hoy en esta sala.</div>`;
                                    }
                                }
                            }, 800);
                        }
                    }
                }
            });
        }

        function updateLiveDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let dateStr = now.toLocaleDateString('es-CL', dateOptions);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('liveDate').innerText = dateStr;

            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('es-CL', timeOptions);

            checkMeetingsExpiration();
        }
        
        window.onload = function() {
            updateLiveDateTime();
            renderDashboard();
            setInterval(updateLiveDateTime, 1000); // Actualiza cada 1 segundo para el reloj y la expiración
        };
    </script>
</body>
</html>
