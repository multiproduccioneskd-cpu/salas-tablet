<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala 1 - Universidad Gabriela Mistral</title>
    <style>
        :root {
            --ugm-azul: #1B2A4A;       /* Azul Institucional */
            --ugm-celeste: #52B3E5;    /* Celeste Complementario */
            --ugm-dorado: #DDA126;     /* Dorado/Amarillo UGM */
            --text-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.png'); /* */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0d121f;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            color: var(--text-white);
        }

        /* --- Panel Principal Izquierdo --- */
        .main-content {
            flex: 1;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(to right, rgba(27, 42, 74, 0.9) 0%, rgba(27, 42, 74, 0.4) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .header-clock {
            position: absolute;
            top: 40px;
            left: 70px;
            font-size: 24px;
            font-weight: 300;
            color: var(--ugm-celeste);
            letter-spacing: 1px;
        }

        .current-event-box {
            margin-bottom: 60px;
        }

        .label {
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--ugm-dorado);
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }

        .current-time-range {
            font-size: 85px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .current-meeting-title {
            font-size: 42px;
            font-weight: 400;
            max-width: 800px;
            line-height: 1.1;
        }

        /* --- Panel Lateral Derecho (Estilo Corporativo) --- */
        .sidebar {
            width: 340px;
            background-color: var(--ugm-azul); /* */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            border-left: 8px solid var(--ugm-dorado); /* */
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .room-info {
            text-align: center;
        }

        .room-label {
            font-size: 20px;
            color: var(--ugm-dorado);
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .room-name {
            font-size: 34px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
        }

        /* Área de Iconos Actualizada */
        .action-icons {
            display: flex;
            flex-direction: column;
            gap: 35px;
            align-items: center;
        }

        /* Contenedor circular mantenido */
        .avatar-icon-btn {
            width: 90px;
            height: 90px;
            background: var(--ugm-celeste); /* */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            overflow: hidden; /* Asegura que la imagen no se salga del círculo */
        }

        .next-events {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
            max-width: 700px;
        }

        .next-item {
            display: flex;
            margin-bottom: 25px;
            align-items: flex-start;
        }

        .next-time {
            min-width: 180px;
            font-size: 20px;
            font-weight: bold;
            color: var(--ugm-celeste);
        }

        .next-title {
            font-size: 22px;
            font-weight: 500;
        }

        .footer-brand {
            text-align: center;
        }

        .footer-text {
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .footer-line {
            width: 60px;
            height: 5px;
            background: var(--ugm-dorado);
            margin: 0 auto;
        }

        /* Animación */
        .fade-in {
            animation: fadeIn 0.7s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-clock" id="clock">Cargando...</div>

        <div class="current-event-box" id="currentArea"></div>

        <div class="next-events">
            <span class="label">Próximas Reuniones</span>
            <div id="nextList"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="room-info">
            <div class="room-label">SALA 01</div>
            <div class="room-name">SALA DE<br>REUNIONES</div>
        </div>

        <div class="action-icons">
            <div class="avatar-icon-btn">
                <img src="Logo_ugm.png" alt="Logo UGM" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="footer-brand-text">UGM INSTITUCIONAL</div>
            <div class="footer-line"></div>
        </div>
    </div>

    <script>
        // DATOS DE PRUEBA (Mantenidos)
        const agenda = [
            { title: "Comité de Rectoría", start: "08:30", end: "10:30" },
            { title: "Reunión de Planificación Académica", start: "11:00", end: "13:00" },
            { title: "Encuentro Alumni UGM", start: "14:30", end: "16:00" },
            { title: "Sesión Junta Directiva", start: "16:30", end: "18:30" }
        ];

        function refresh() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: true });
            const dateStr = now.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('clock').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1) + " | " + timeStr;

            const hhmm = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const current = agenda.find(m => hhmm >= m.start && hhmm <= m.end);
            
            const currentArea = document.getElementById('currentArea');
            if (current) {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Reunión en Curso</span>
                        <div class="current-time-range">${current.start} - ${current.end}</div>
                        <div class="current-meeting-title">${current.title}</div>
                        <div style="display:inline-block; margin-top:20px; padding:8px 20px; background:#e53e3e; border-radius:5px; font-weight:bold; letter-spacing:1px;">OCUPADO</div>
                    </div>`;
            } else {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Estado de Sala</span>
                        <div class="current-time-range">${hhmm}</div>
                        <div class="current-title" style="color:var(--ugm-celeste)">Sala disponible para uso inmediato</div>
                        <div style="display:inline-block; margin-top:20px; padding:8px 20px; background:#38a169; border-radius:5px; font-weight:bold; letter-spacing:1px;">DISPONIBLE</div>
                    </div>`;
            }

            const nexts = agenda.filter(m => m.start > hhmm).slice(0, 2);
            const nextList = document.getElementById('nextList');
            if (nexts.length > 0) {
                nextList.innerHTML = nexts.map(m => `
                    <div class="next-item fade-in">
                        <div class="next-time">${m.start} - ${m.end}</div>
                        <div class="next-title">${m.title}</div>
                    </div>`).join('');
            } else {
                nextList.innerHTML = '<div class="next-item" style="opacity:0.5 italic">No hay más reuniones agendadas hoy.</div>';
            }
        }

        setInterval(refresh, 60000);
        window.onload = refresh;
    </script>
</body>
</html>
