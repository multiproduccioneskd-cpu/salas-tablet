<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Reuniones - Tablet Display</title>
    <style>
        :root {
            --ugm-azul: #1B2A4A;
            --ugm-celeste: #52B3E5;
            --ugm-dorado: #DDA126;
            --bg-glass: rgba(0, 0, 0, 0.65);
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- Panel Principal Izquierdo --- */
        .main-content {
            flex: 1;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(10px);
        }

        .header-info {
            position: absolute;
            top: 40px;
            left: 70px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .current-date {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--ugm-celeste);
        }

        /* Área de Logo Ampliada sin Círculo */
        .logo-container {
            position: absolute;
            top: 20px;
            right: 20px; /* Ajustado para que no interfiera con el texto */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-image {
            width: 150px; /* Tamaño mucho más grande */
            height: auto;
            object-fit: contain; /* Asegura que no se deforme */
        }

        /* Evento Actual */
        .current-event-container {
            margin-bottom: 60px;
        }

        .label {
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--ugm-dorado);
            margin-bottom: 10px;
            display: block;
            font-weight: bold;
        }

        .current-time {
            font-size: 80px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
        }

        .current-title {
            font-size: 38px;
            font-weight: 400;
            max-width: 800px;
            color: #fff;
        }

        .status-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            background: #e53e3e; /* Rojo por defecto */
        }

        .status-available {
            background: #38a169; /* Verde (Disponible) */
        }

        /* Próximos Eventos */
        .next-events-container {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
            max-width: 600px;
        }

        .next-event-item {
            display: flex;
            margin-bottom: 25px;
            align-items: flex-start;
        }

        .next-time {
            min-width: 180px;
            font-size: 18px;
            font-weight: bold;
            color: var(--ugm-celeste);
        }

        .next-details .next-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .next-details .next-org {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        /* --- Panel Lateral Derecho --- */
        .sidebar {
            width: 320px;
            background-color: var(--ugm-azul);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            border-left: 8px solid var(--ugm-dorado);
            position: relative;
        }

        .room-id {
            text-align: center;
        }

        .room-number {
            font-size: 24px;
            color: var(--ugm-dorado);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .room-name {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
        }

        .sidebar-icons {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 50px;
        }

        .icon-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .icon-btn img, .icon-btn svg {
            width: 35px;
            fill: white;
        }

        .bottom-line {
            width: 40px;
            height: 4px;
            background: var(--ugm-dorado);
            margin: 0 auto;
        }

        /* Animación */
        .fade-in {
            animation: fadeIn 0.8s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-content" id="mainDisplay">
        <div class="header-info">
            <div class="current-date" id="liveClock">Cargando...</div>
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo-image"> </div>

        <div class="current-event-container" id="currentArea"></div>

        <div class="next-events-container">
            <span class="label">Próximas Reuniones</span>
            <div id="nextList"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="room-id">
            <div class="room-number">SALA 01</div>
            <div class="room-name">Sala de<br>Reuniones</div>
        </div>

        <div class="sidebar-icons">
            <div class="icon-btn">
                <svg viewBox="0 0 24 24"><path fill="white" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
            </div>
            <div class="icon-btn">
                <svg viewBox="0 0 24 24"><path fill="white" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>
        </div>

        <div style="text-align: center;">
            <div style="font-size: 10px; color: var(--ugm-celeste); margin-bottom: 10px; font-weight: bold;">UGM INSTITUCIONAL</div>
            <div class="bottom-line"></div>
        </div>
    </div>

    <script>
        // Mismos datos de prueba
        const agendaSala = [
            { title: "Reunión de Rectoría", org: "Secretaría General", start: "08:30", end: "10:30" },
            { title: "Comité Académico", org: "Vicerrectoría", start: "11:30", end: "13:00" },
            { title: "Planificación Alumni UGM", org: "Vinculación", start: "15:00", end: "16:30" },
            { title: "Revisión de Presupuesto", org: "Finanzas", start: "17:00", end: "18:30" }
        ];

        function updateDisplay() {
            const now = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('liveClock').innerText = now.toLocaleDateString('es-CL', dateOptions) + " | " + now.toLocaleTimeString('es-CL', timeOptions);

            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const currentMeeting = agendaSala.find(m => currentTimeStr >= m.start && currentTimeStr <= m.end);
            const currentArea = document.getElementById('currentArea');

            if (currentMeeting) {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Evento Actual</span>
                        <div class="current-time">${currentMeeting.start} - ${currentMeeting.end}</div>
                        <div class="current-title">${currentMeeting.title}</div>
                        <div class="status-indicator">OCUPADO</div>
                    </div>`;
            } else {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Estado de la Sala</span>
                        <div class="current-time">${currentTimeStr}</div>
                        <div class="current-title">Disponible para uso inmediato</div>
                        <div class="status-indicator status-available">DISPONIBLE</div>
                    </div>`;
            }

            const nextMeetings = agendaSala.filter(m => m.start > currentTimeStr).slice(0, 3);
            const nextList = document.getElementById('nextList');
            if (nextMeetings.length > 0) {
                nextList.innerHTML = nextMeetings.map(m => `
                    <div class="next-event-item fade-in">
                        <div class="next-time">${m.start} - ${m.end}</div>
                        <div class="next-details">
                            <div class="next-title">${m.title}</div>
                            <div class="next-org">${m.org}</div>
                        </div>
                    </div>`).join('');
            } else {
                nextList.innerHTML = '<div class="next-event-item">No hay más reuniones agendadas hoy.</div>';
            }
        }

        setInterval(updateDisplay, 60000);
        window.onload = updateDisplay;
    </script>
</body>
</html>
