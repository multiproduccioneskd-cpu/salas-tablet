<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Agenda diaria de Salas - UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .main-header {
            background: rgba(27, 42, 74, 0.95);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 5px solid #dda126;
        }

        .header-left-block { display: flex; align-items: center; gap: 20px; }
        .header-logo { width: 65px; height: auto; object-fit: contain; }
        .header-text-group .title { font-size: 22px; font-weight: bold; letter-spacing: 0.5px; }
        .header-text-group .subtitle { font-size: 12px; color: #b0c4de; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: right;
            line-height: 1.3;
        }

        .live-time { color: #52b3e5; display: block; font-size: 16px; margin-top: 2px; }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48%, 1fr));
            gap: 20px;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) { .rooms-grid { grid-template-columns: 1fr; } }

        .room-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border-top: 5px solid #1b2a4a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .room-card:hover { transform: translateY(-2px); }
        .room-card.directorio-style { border-top: 5px solid #dda126; }

        .room-title-bar {
            background: rgba(248, 249, 250, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name { font-size: 16px; font-weight: bold; color: #1b2a4a; }
        .room-card.directorio-style .room-name { color: #b8820a; }
        .event-count { font-size: 11px; background: #1b2a4a; color: #fff; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .room-card.directorio-style .event-count { background: #dda126; }

        .meetings-list { padding: 15px 20px; flex-grow: 1; overflow-y: auto; max-height: 280px; }

        .meeting-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            opacity: 1;
            transform: scaleY(1);
            transform-origin: top;
            transition: opacity 0.8s ease, transform 0.8s ease, padding 0.8s ease, max-height 0.8s ease;
            max-height: 100px; 
        }

        .meeting-item:last-child { border-bottom: none; }
        .meeting-time { min-width: 95px; }
        .time-box { background: #e2e8f0; color: #1b2a4a; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; display: inline-block; text-align: center; }
        .meeting-details { flex-grow: 1; padding-left: 15px; }
        .meeting-title { font-size: 14px; font-weight: bold; color: #2d3748; margin-bottom: 2px; }
        .meeting-info { font-size: 12px; color: #718096; }

        .meeting-item.fade-out {
            opacity: 0;
            transform: scaleY(0);
            padding-top: 0;
            padding-bottom: 0;
            max-height: 0;
            border-bottom: none;
        }

        .no-meetings { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 120px; color: #718096; font-style: italic; font-size: 13px; text-align: center; }

        .brand-bar { height: 5px; width: 100%; display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .brand-bar .color-1 { flex: 2; background-color: #1b2a4a; }
        .brand-bar .color-2 { flex: 1; background-color: #52b3e5; }
        .brand-bar .color-3 { flex: 1; background-color: #dda126; }
        .footer-text { text-align: center; margin-top: 10px; font-size: 11px; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-left-block">
            <img src="logo-blanco-celeste.png" alt="Logo UGM" class="header-logo">
            <div class="header-text-group">
                <div class="title">Visor de Agenda diaria de Salas</div>
                <div class="subtitle">Universidad Gabriela Mistral — Vista General</div>
            </div>
        </div>
        <div class="date-badge">
            <span id="liveDate">Cargando fecha...</span>
            <span id="liveTime" class="live-time">00:00:00</span>
        </div>
    </div>

    <div class="rooms-grid" id="roomsContainer"></div>

    <div>
        <div class="brand-bar">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
        </div>
        <div class="footer-text">Universidad Gabriela Mistral — Construyendo Nuestra Huella</div>
    </div>

    <script>
        // MAPEO DE SALAS CONECTADO A SHAREPOINT
        // Nota: Asegúrate de ajustar los strings "displayName" para que calcen con cómo se llaman en tu Sharepoint.
        let salasUGM = [
            { id: "s-dir", displayName: "Sala de Directorio", isDirectorio: true, agenda: [] },
            { id: "s-re2", displayName: "Sala de Reuniones 2", isDirectorio: false, agenda: [] },
            { id: "s-re3", displayName: "Sala de Reuniones 3", isDirectorio: false, agenda: [] },
            { id: "s-re4", displayName: "Sala de Reuniones 4", isDirectorio: false, agenda: [] }
        ];

        // 1. CONSUMIR DATOS DESDE NUESTRO BACKEND SEGURO EN VERCEL
        async function fetchSalasFromAPI() {
            try {
                const response = await fetch('/api/salas');
                const data = await response.json();
                
                if (data && data.value) {
                    processSharepointData(data.value);
                }
            } catch (error) {
                console.error("Error cargando agendas de Microsoft Graph:", error);
            }
        }

        // 2. PROCESAR E INYECTAR LA DATA DE SHAREPOINT EN EL DASHBOARD
        function processSharepointData(items) {
            // Limpiar agendas anteriores antes de mapear lo nuevo
            salasUGM.forEach(s => s.agenda = []);

            const hoy = new Date();
            const yyyy = hoy.getFullYear();
            const mm = String(hoy.getMonth() + 1).padStart(2, '0');
            const dd = String(hoy.getDate()).padStart(2, '0');
            const fechaHoyStr = `${yyyy}-${mm}-${dd}`; // Formato YYYY-MM-DD

            items.forEach((item, index) => {
                const fields = item.fields;
                if (!fields) return;

                // Extraemos las variables según las columnas típicas de Sharepoint
                // AJUSTAR AQUÍ si tus nombres de columna cambian (ej: fields.Title, fields.Organiza, etc.)
                const tituloReunion = fields.Title || "Reunión Sin Título";
                const organo = fields.Organiza || fields.Author || "Institucional";
                const nombreSalaDestino = fields.Sala || ""; 
                const horaInicio = fields.HoraInicio || "00:00"; // Formato esperado "HH:MM"
                const horaFin = fields.HoraFin || "00:00";
                const fechaReunion = fields.Fecha || ""; // Esperado "YYYY-MM-DD"

                // FILTRO 1: Que la reunión pertenezca estrictamente al día de hoy
                if (fechaReunion.startsWith(fechaHoyStr) || fechaReunion === fechaHoyStr) {
                    
                    // Buscamos a qué sala corresponde en nuestro arreglo de la pantalla
                    const salaEncontrada = salasUGM.find(s => nombreSalaDestino.toLowerCase().includes(s.displayName.toLowerCase()));
                    
                    if (salaEncontrada) {
                        salaEncontrada.agenda.push({
                            idMeet: `sp-${index}`,
                            title: tituloReunion,
                            org: organo,
                            startTime: horaInicio,
                            endTime: horaFin
                        });
                    }
                }
            });

            // Ordenar las reuniones de cada sala cronológicamente por hora de inicio
            salasUGM.forEach(sala => {
                sala.agenda.sort((a, b) => a.startTime.localeCompare(b.startTime));
            });

            // Pintar la interfaz actualizada
            renderDashboard();
        }

        // 3. RENDERIZAR LA INTERFAZ EN EL GRID HTML
        function renderDashboard() {
            const container = document.getElementById('roomsContainer');
            let gridHTML = "";

            salasUGM.forEach(sala => {
                const cardClass = sala.isDirectorio ? "room-card directorio-style" : "room-card";
                const totalReuniones = sala.agenda.length;
                const countText = totalReuniones === 0 ? "Disponible" : (totalReuniones === 1 ? "1 Reunión" : `${totalReuniones} Reuniones`);

                gridHTML += `
                    <div class="${cardClass}">
                        <div class="room-title-bar">
                            <span class="room-name">${sala.displayName}</span>
                            <span class="event-count" id="count-${sala.id}">${countText}</span>
                        </div>
                        <div class="meetings-list" id="list-${sala.id}">
                `;

                if (totalReuniones === 0) {
                    gridHTML += `<div class="no-meetings" id="empty-${sala.id}">No hay reuniones programadas para hoy en esta sala.</div>`;
                } else {
                    sala.agenda.forEach(meet => {
                        gridHTML += `
                            <div class="meeting-item" id="meet-${meet.idMeet}">
                                <div class="meeting-time">
                                    <span class="time-box">${meet.startTime} - ${meet.endTime}</span>
                                </div>
                                <div class="meeting-details">
                                    <div class="meeting-title">${meet.title}</div>
                                    <div class="meeting-info">Organiza: ${meet.org}</div>
                                </div>
                            </div>
                        `;
                    });
                }

                gridHTML += `</div></div>`;
            });

            container.innerHTML = gridHTML;
        }

        // 4. LÓGICA AUTOMÁTICA DE FADE-OUT PASADOS 20 MINUTOS
        function checkMeetingsExpiration() {
            const now = new Date();
            const currentMinutesTotal = (now.getHours() * 60) + now.getMinutes();

            salasUGM.forEach(sala => {
                for (let i = sala.agenda.length - 1; i >= 0; i--) {
                    const meet = sala.agenda[i];
                    const [startHour, startMin] = meet.startTime.split(':').map(Number);
                    const startMinutesTotal = (startHour * 60) + startMin;

                    // Si pasaron 20 minutos de la hora de inicio, gatillar la animación
                    if (currentMinutesTotal >= (startMinutesTotal + 20)) {
                        const element = document.getElementById(`meet-${meet.idMeet}`);
                        
                        if (element && !element.classList.contains('fade-out')) {
                            element.classList.add('fade-out');

                            setTimeout(() => {
                                sala.agenda = sala.agenda.filter(m => m.idMeet !== meet.idMeet);
                                element.remove();
                                
                                const total = sala.agenda.length;
                                document.getElementById(`count-${sala.id}`).innerText = total === 0 ? "Disponible" : (total === 1 ? "1 Reunión" : `${total} Reuniones`);
                                
                                if (total === 0) {
                                    const listContainer = document.getElementById(`list-${sala.id}`);
                                    if (listContainer && !document.getElementById(`empty-${sala.id}`)) {
                                        listContainer.innerHTML = `<div class="no-meetings" id="empty-${sala.id}">No hay reuniones programadas para hoy en esta sala.</div>`;
                                    }
                                }
                            }, 800);
                        }
                    }
                }
            });
        }

        function updateLiveDateTime() {
            const now = new Date();
            
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let dateStr = now.toLocaleDateString('es-CL', dateOptions);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('liveDate').innerText = dateStr;

            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('es-CL', timeOptions);

            checkMeetingsExpiration();
        }
        
        window.onload = function() {
            updateLiveDateTime();
            fetchSalasFromAPI(); // Carga inicial desde Sharepoint
            
            setInterval(updateLiveDateTime, 1000); // Reloj y borrado cada 1 segundo
            setInterval(fetchSalasFromAPI, 300000); // Sincroniza con Sharepoint cada 5 minutos automáticamente
        };
    </script>
</body>
</html>
