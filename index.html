<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Salas de Reuniones - UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Encabezado Superior Translúcido */
        .main-header {
            background: rgba(27, 42, 74, 0.95);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 5px solid #dda126;
        }

        .header-left .title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .header-left .subtitle {
            font-size: 12px;
            color: #b0c4de;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Contenedor Grid para ver todas las salas a la vez */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48%, 1fr));
            gap: 20px;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .rooms-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Tarjeta de cada Sala */
        .room-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border-top: 5px solid #1b2a4a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .room-card:hover {
            transform: translateY(-2px);
        }

        /* Variación para destacar visualmente el Directorio */
        .room-card.directorio-style {
            border-top: 5px solid #dda126;
        }

        .room-title-bar {
            background: rgba(248, 249, 250, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name {
            font-size: 16px;
            font-weight: bold;
            color: #1b2a4a;
        }

        .room-card.directorio-style .room-name {
            color: #b8820a;
        }

        .event-count {
            font-size: 11px;
            background: #1b2a4a;
            color: #fff;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .room-card.directorio-style .event-count {
            background: #dda126;
        }

        /* Lista de reuniones dentro de la tarjeta */
        .meetings-list {
            padding: 15px 20px;
            flex-grow: 1;
            overflow-y: auto;
            max-height: 280px;
        }

        /* Item de reunión individual */
        .meeting-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .meeting-item:last-child {
            border-bottom: none;
        }

        .meeting-time {
            min-width: 95px;
        }

        .time-box {
            background: #e2e8f0;
            color: #1b2a4a;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            text-align: center;
        }

        .meeting-details {
            flex-grow: 1;
            padding-left: 15px;
        }

        .meeting-title {
            font-size: 14px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 2px;
        }

        .meeting-info {
            font-size: 12px;
            color: #718096;
        }

        /* Estado sin reuniones */
        .no-meetings {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 120px;
            color: #718096;
            font-style: italic;
            font-size: 13px;
            text-align: center;
        }

        /* Barra Inferior Corporativa */
        .brand-bar {
            height: 5px;
            width: 100%;
            display: flex;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .brand-bar .color-1 { flex: 2; background-color: #1b2a4a; }
        .brand-bar .color-2 { flex: 1; background-color: #52b3e5; }
        .brand-bar .color-3 { flex: 1; background-color: #dda126; }

        .footer-text {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-left">
            <div class="title">Control de Agenda Diaria de Salas</div>
            <div class="subtitle">Universidad Gabriela Mistral — Vista General</div>
        </div>
        <div class="date-badge" id="liveDate"></div>
    </div>

    <div class="rooms-grid" id="roomsContainer"></div>

    <div>
        <div class="brand-bar">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
        </div>
        <div class="footer-text">
            Universidad Gabriela Mistral — Construyendo Nuestra Huella
        </div>
    </div>

    <script>
        // =========================================================================
        // CONFIGURACIÓN DE CONEXIÓN A LAS SALAS (MAPEO DE CORREOS / GUID DE OUTLOOK)
        // =========================================================================
        // Cuando tengas la API real, cambiarás el "displayName" y los datos de la "agenda"
        // dinámicamente con la respuesta JSON que te entregue Microsoft Graph.
        const salasUGM = [
            {
                id: "3162F1E1-C4C0-604B-51D8-91DA78970B97", // Ejemplo de GUID o correo de recurso
                resourceEmail: "sala.directorio@ugm.cl",
                displayName: "Sala de Directorio",       // Nombre dinámico en pantalla
                isDirectorio: true,                        // Activa el color dorado decorativo
                agenda: [
                    { title: "Sesión Ordinaria de Directorio UGM", org: "Secretaría General", time: "09:00 - 11:00" },
                    { title: "Comité de Aseguramiento de la Calidad", org: "Dirección de Calidad", time: "11:30 - 13:00" },
                    { title: "Revisión Estratégica Institucional", org: "Rectoría", time: "15:00 - 16:30" }
                ]
            },
            {
                id: "A1B2C3D4-E5F6-7A8B-9C0D-1E2F3A4B5C6D",
                resourceEmail: "sala.reuniones2@ugm.cl",
                displayName: "Sala de Reuniones 2",
                isDirectorio: false,
                agenda: [
                    { title: "Coordinación Matrículas y Admisión", org: "Equipo de Difusión", time: "10:00 - 11:30" },
                    { title: "Planificación Encuentro Alumni UGM", org: "Dirección de Vinculación", time: "14:30 - 16:00" }
                ]
            },
            {
                id: "F6E5D4C3-B2A1-0F9E-8D7C-6B5A4M3N2P1Q",
                resourceEmail: "sala.reuniones3@ugm.cl",
                displayName: "Sala de Reuniones 3",
                isDirectorio: false,
                agenda: [] // Lista vacía para simular estado disponible
            },
            {
                id: "78912345-6789-abcd-ef01-234567890abc",
                resourceEmail: "sala.reuniones4@ugm.cl",
                displayName: "Sala de Reuniones 4",
                isDirectorio: false,
                agenda: [
                    { title: "Alineación Plataformas TI y Virtuales", org: "Soporte Técnico", time: "16:00 - 17:30" }
                ]
            }
        ];

        // Función encargada de renderizar la grilla completa en base al arreglo de salas
        function renderDashboard() {
            const container = document.getElementById('roomsContainer');
            let gridHTML = "";

            salasUGM.forEach(sala => {
                // Determinar clases de estilo y contadores según la data
                const cardClass = sala.isDirectorio ? "room-card directorio-style" : "room-card";
                const totalReuniones = sala.agenda.length;
                const countText = totalReuniones === 0 ? "Disponible" : (totalReuniones === 1 ? "1 Reunión" : `${totalReuniones} Reuniones`);

                // Construcción de la cabecera de la casilla con el nombre dinámico de la sala
                gridHTML += `
                    <div class="${cardClass}">
                        <div class="room-title-bar">
                            <span class="room-name">${sala.displayName}</span>
                            <span class="event-count">${countText}</span>
                        </div>
                        <div class="meetings-list">
                `;

                // Construcción de la lista de reuniones interna
                if (totalReuniones === 0) {
                    gridHTML += `
                        <div class="no-meetings">
                            No hay reuniones programadas para hoy en esta sala.
                        </div>
                    `;
                } else {
                    sala.agenda.forEach(meet => {
                        gridHTML += `
                            <div class="meeting-item">
                                <div class="meeting-time">
                                    <span class="time-box">${meet.time}</span>
                                </div>
                                <div class="meeting-details">
                                    <div class="meeting-title">${meet.title}</div>
                                    <div class="meeting-info">Organiza: ${meet.org}</div>
                                </div>
                            </div>
                        `;
                    });
                }

                // Cierre de etiquetas de la tarjeta
                gridHTML += `
                        </div>
                    </div>
                `;
            });

            // Inyectar todo el HTML estructurado dentro del contenedor común
            container.innerHTML = gridHTML;
        }

        // Función para inyectar la fecha del día actual automáticamente en el header
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            let dateStr = today.toLocaleDateString('es-CL', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('liveDate').innerText = dateStr;
        }
        
        window.onload = function() {
            updateDate();
            renderDashboard(); // Dibuja las salas dinámicamente al cargar
        };
    </script>
</body>
</html>
