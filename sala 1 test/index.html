<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala 2 - UGM Tablet Display</title>
    <style>
        :root {
            --ugm-azul: #1B2A4A;
            --ugm-celeste: #52B3E5;
            --ugm-dorado: #DDA126;
            --ugm-rojo-corporativo: #9E1B1B; /* Rojo inspirado en el panel de la tablet de referencia */
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Vinculado exactamente a tu imagen PNG de GitHub */
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0d121f;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- Panel Principal Izquierdo (Muestra Eventos) --- */
        .main-content {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-info {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
        }

        .current-date {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--ugm-celeste);
        }

        /* Área Estado / Evento Actual */
        .current-event-container {
            margin-bottom: 50px;
            margin-top: 40px;
        }

        .label {
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--ugm-dorado);
            margin-bottom: 12px;
            display: block;
            font-weight: bold;
        }

        .current-time {
            font-size: 75px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .current-title {
            font-size: 36px;
            font-weight: 400;
            max-width: 750px;
            color: #ffffff;
            line-height: 1.2;
        }

        /* --- Panel Lateral Derecho (Estilo Tablet de Referencia) --- */
        .sidebar {
            width: 300px;
            background-color: var(--ugm-rojo-corporativo);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 20px;
            border-left: 6px solid var(--ugm-azul);
            position: relative;
        }

        .room-id {
            text-align: center;
            margin-top: 20px;
        }

        .room-number {
            font-size: 22px;
            color: var(--ugm-dorado);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .room-name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
        }

        /* Iconos de Acción e Indicadores inferiores */
        .sidebar-icons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        /* Icono de Personas Redondo de la Referencia */
        .avatar-icon-btn {
            width: 80px;
            height: 80px;
            background: #52B3E5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #ffffff;
        }

        .action-grid {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .icon-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.25);
            transition: background 0.2s;
        }

        .icon-btn svg {
            width: 28px;
            height: 28px;
        }

        .sidebar-footer {
            text-align: center;
            width: 100%;
        }

        .footer-brand-text {
            font-size: 11px;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .footer-line {
            width: 50px;
            height: 4px;
            background: var(--ugm-dorado);
            margin: 0 auto;
            border-radius: 2px;
        }

        /* Área Próximas Reuniones */
        .next-events-container {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
            max-width: 700px;
        }

        .next-event-item {
            display: flex;
            margin-bottom: 22px;
            align-items: flex-start;
        }

        .next-time {
            min-width: 160px;
            font-size: 18px;
            font-weight: bold;
            color: var(--ugm-celeste);
        }

        .next-details .next-title {
            font-size: 19px;
            font-weight: 500;
            margin-bottom: 2px;
            color: #ffffff;
        }

        .next-details .next-org {
            font-size: 14px;
            color: rgba(255,255,255,0.55);
        }

        .fade-in {
            animation: fadeInElement 0.6s ease-in-out forwards;
        }
        @keyframes fadeInElement {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-info">
            <div class="current-date" id="liveClock">Cargando fecha y hora...</div>
        </div>

        <div class="current-event-container" id="currentArea"></div>

        <div class="next-events-container">
            <span class="label">Next Events</span>
            <div id="nextList"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="room-id">
            <div class="room-number">ROOM 2</div>
            <div class="room-name">Sala de<br>Reuniones</div>
        </div>

        <div class="sidebar-icons">
            <div class="avatar-icon-btn">
                <svg viewBox="0 0 24 24" width="45" height="45"><path fill="#ffffff" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </div>
            
            <div class="action-grid">
                <div class="icon-btn">
                    <svg viewBox="0 0 24 24"><path fill="#ffffff" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
                </div>
                <div class="icon-btn">
                    <svg viewBox="0 0 24 24"><path fill="#ffffff" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="footer-brand-text">UGM INSTITUCIONAL</div>
            <div class="footer-line"></div>
        </div>
    </div>

    <script>
        // Data estructurada de la sala de pruebas igual al formato de la tablet de ejemplo
        const agendaSala = [
            { title: "Discussion", org: "Scrum Team", start: "06:30", end: "19:30" }, // Forzado en este rango para pruebas de visualización nocturna/tarde
            { title: "Status Meeting Scrum Team", org: "Product Owner", start: "19:45", end: "20:45" },
            { title: "Progress Update", org: "Soporte Técnico", start: "21:00", end: "22:00" }
        ];

        function updateTabletDisplay() {
            const now = new Date();
            
            // Reloj en formato inglés para calzar con la estética limpia solicitada
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
            const dateOptions = { day: 'numeric', month: 'short' };
            
            const timeStr = now.toLocaleTimeString('en-US', timeOptions);
            const dateStr = now.toLocaleDateString('en-US', dateOptions);
            
            document.getElementById('liveClock').innerText = dateStr + " " + timeStr;

            // Formato 24h interno para comparar rangos
            const currentHourStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            const activeMeeting = agendaSala.find(meet => currentHourStr >= meet.start && currentHourStr <= meet.end);
            const currentArea = document.getElementById('currentArea');

            if (activeMeeting) {
                // Conversión rápida de horas militares a formato de 12 horas AM/PM para el bloque de texto gigante
                const start12 = convertTo12Hour(activeMeeting.start);
                const end12 = convertTo12Hour(activeMeeting.end);

                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Current Event</span>
                        <div class="current-time">${start12} - ${end12}</div>
                        <div class="current-title">${activeMeeting.title}</div>
                    </div>
                `;
            } else {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Room Status</span>
                        <div class="current-time">${now.toLocaleTimeString('en-US', timeOptions)}</div>
                        <div class="current-title" style="color: var(--ugm-celeste);">Available for immediate use</div>
                    </div>
                `;
            }

            // Filtrar y pintar los siguientes 2 eventos
            const upcomingMeetings = agendaSala.filter(meet => meet.start > currentHourStr).slice(0, 2);
            const nextList = document.getElementById('nextList');
            
            if (upcomingMeetings.length > 0) {
                nextList.innerHTML = upcomingMeetings.map(meet => `
                    <div class="next-event-item fade-in">
                        <div class="next-time">${dateStr} &nbsp; ${convertTo12Hour(meet.start)} - ${convertTo12Hour(meet.end)}</div>
                        <div class="next-details">
                            <div class="next-title">${meet.title}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                nextList.innerHTML = '<div class="next-event-item fade-in" style="color: rgba(255,255,255,0.4); font-style: italic;">No more events scheduled for today.</div>';
            }
        }

        function convertTo12Hour(timeStr24) {
            const [hrs, mins] = timeStr24.split(':');
            let h = parseInt(hrs);
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${mins} ${ampm}`;
        }

        // Actualización activa cada 1 minuto
        setInterval(updateTabletDisplay, 60000);
        window.onload = updateTabletDisplay;
    </script>
</body>
</html>
