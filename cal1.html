<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Reuniones - UGM Tablet Display</title>
    <style>
        :root {
            --ugm-azul: #1B2A4A;
            --ugm-celeste: #52B3E5;
            --ugm-dorado: #DDA126;
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('FONDO PANTALLA REUNIÓN ALUMNI.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0d121f;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- Panel Principal Izquierdo (Contenido y Reuniones) --- */
        .main-content {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-info {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
        }

        .current-date {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--ugm-celeste);
        }

        /* Área Estado / Evento Actual */
        .current-event-container {
            margin-bottom: 50px;
            margin-top: 40px;
        }

        .label {
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--ugm-dorado);
            margin-bottom: 12px;
            display: block;
            font-weight: bold;
        }

        .current-time {
            font-size: 75px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .current-title {
            font-size: 36px;
            font-weight: 400;
            max-width: 750px;
            color: #ffffff;
            line-height: 1.2;
        }

        .status-indicator {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 1px;
            background: #cd3d3d; /* Rojo para Ocupado */
            box-shadow: 0 4px 12px rgba(205, 61, 61, 0.3);
        }

        .status-available {
            background: #2f9e5f; /* Verde para Disponible */
            box-shadow: 0 4px 12px rgba(47, 158, 95, 0.3);
        }

        /* Área Próximas Reuniones */
        .next-events-container {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
            max-width: 700px;
        }

        .next-event-item {
            display: flex;
            margin-bottom: 22px;
            align-items: flex-start;
        }

        .next-time {
            min-width: 160px;
            font-size: 18px;
            font-weight: bold;
            color: var(--ugm-celeste);
        }

        .next-details .next-title {
            font-size: 19px;
            font-weight: 500;
            margin-bottom: 2px;
            color: #ffffff;
        }

        .next-details .next-org {
            font-size: 14px;
            color: rgba(255,255,255,0.55);
        }

        /* --- Panel Lateral Derecho (Identificador de Sala) --- */
        .sidebar {
            width: 300px;
            background-color: var(--ugm-azul);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 20px;
            border-left: 6px solid var(--ugm-dorado);
            position: relative;
        }

        .room-id {
            text-align: center;
            margin-top: 20px;
        }

        .room-number {
            font-size: 22px;
            color: var(--ugm-dorado);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .room-name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
        }

        .sidebar-icons {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .icon-btn {
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .icon-btn svg {
            width: 30px;
            height: 30px;
        }

        .sidebar-footer {
            text-align: center;
            width: 100%;
        }

        .footer-brand-text {
            font-size: 11px;
            color: var(--ugm-celeste);
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .footer-line {
            width: 50px;
            height: 4px;
            background: var(--ugm-dorado);
            margin: 0 auto;
            border-radius: 2px;
        }

        /* Animaciones de transición (Fade In) */
        .fade-in {
            animation: fadeInElement 0.6s ease-in-out forwards;
        }
        @keyframes fadeInElement {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-info">
            <div class="current-date" id="liveClock">Cargando fecha y hora...</div>
        </div>

        <div class="current-event-container" id="currentArea">
            </div>

        <div class="next-events-container">
            <span class="label">Próximas Reuniones de Hoy</span>
            <div id="nextList">
                </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="room-id">
            <div class="room-number">SALA 01</div>
            <div class="room-name">Sala de<br>Reuniones</div>
        </div>

        <div class="sidebar-icons">
            <div class="icon-btn">
                <svg viewBox="0 0 24 24"><path fill="#ffffff" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
            </div>
            <div class="icon-btn">
                <svg viewBox="0 0 24 24"><path fill="#ffffff" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="footer-brand-text">UGM INSTITUCIONAL</div>
            <div class="footer-line"></div>
        </div>
    </div>

    <script>
        // =========================================================================
        // AGENDA DE PRUEBA: Edita estos datos directamente desde el Bloc de notas
        // =========================================================================
        const agendaSala = [
            { title: "Reunión de Rectoría", org: "Secretaría General", start: "08:30", end: "10:30" },
            { title: "Comité Académico Interno", org: "Vicerrectoría Académica", start: "11:00", end: "13:00" },
            { title: "Planificación Alumni UGM", org: "Dirección de Vinculación", start: "14:30", end: "16:00" },
            { title: "Soporte de Plataformas Online", org: "Dirección TI", start: "16:30", end: "18:00" }
        ];

        function updateTabletDisplay() {
            const now = new Date();
            
            // 1. Renderizar el reloj del sistema (Fecha | Hora)
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            
            let dateString = now.toLocaleDateString('es-CL', dateOptions);
            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            
            document.getElementById('liveClock').innerText = dateString + " | " + now.toLocaleTimeString('es-CL', timeOptions);

            // Generar string HH:MM de la hora actual para comparar con la agenda
            const currentHourStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            // 2. Lógica para buscar el Evento de la Hora Actual
            const activeMeeting = agendaSala.find(meet => currentHourStr >= meet.start && currentHourStr <= meet.end);
            const currentArea = document.getElementById('currentArea');

            if (activeMeeting) {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Evento Actual</span>
                        <div class="current-time">${activeMeeting.start} - ${activeMeeting.end}</div>
                        <div class="current-title">${activeMeeting.title}</div>
                        <div class="status-indicator">OCUPADO</div>
                    </div>
                `;
            } else {
                currentArea.innerHTML = `
                    <div class="fade-in">
                        <span class="label">Estado de la Sala</span>
                        <div class="current-time">${currentHourStr}</div>
                        <div class="current-title">Disponible para uso inmediato</div>
                        <div class="status-indicator status-available">DISPONIBLE</div>
                    </div>
                `;
            }

            // 3. Lógica para renderizar los Próximos Eventos del día
            const upcomingMeetings = agendaSala.filter(meet => meet.start > currentHourStr).slice(0, 3);
            const nextList = document.getElementById('nextList');
            
            if (upcomingMeetings.length > 0) {
                nextList.innerHTML = upcomingMeetings.map(meet => `
                    <div class="next-event-item fade-in">
                        <div class="next-time">${meet.start} - ${meet.end}</div>
                        <div class="next-details">
                            <div class="next-title">${meet.title}</div>
                            <div class="next-org">Organiza: ${meet.org}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                nextList.innerHTML = '<div class="next-event-item fade-in" style="color: rgba(255,255,255,0.4); font-style: italic;">No hay más reuniones agendadas para el resto del día.</div>';
            }
        }

        // Configuración de refresco: actualiza automáticamente cada 1 minuto (60000 ms)
        setInterval(updateTabletDisplay, 60000);
        window.onload = updateTabletDisplay;
    </script>
</body>
</html>
